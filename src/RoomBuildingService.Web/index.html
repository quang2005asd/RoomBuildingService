<!doctype html>
<html class="light" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facility OS – Quản trị hệ thống</title>
    <meta name="description" content="Dashboard quản lý tòa nhà, phòng, giường và thiết bị ký túc xá." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

    <!-- Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'on-secondary': '#ffffff',
              'on-secondary-container': '#57657b',
              'surface': '#f7f9fb',
              'on-surface': '#191c1e',
              'on-primary-fixed': '#131b2e',
              'surface-container-low': '#f2f4f6',
              'primary-container': '#131b2e',
              'on-tertiary-fixed': '#001a42',
              'on-primary': '#ffffff',
              'error': '#ba1a1a',
              'primary': '#000000',
              'surface-container-high': '#e6e8ea',
              'on-error': '#ffffff',
              'tertiary': '#000000',
              'secondary-container': '#d5e3fd',
              'on-secondary-fixed': '#0d1c2f',
              'error-container': '#ffdad6',
              'surface-bright': '#f7f9fb',
              'on-tertiary-fixed-variant': '#004395',
              'primary-fixed-dim': '#bec6e0',
              'tertiary-fixed-dim': '#adc6ff',
              'tertiary-fixed': '#d8e2ff',
              'surface-tint': '#565e74',
              'on-primary-container': '#7c839b',
              'surface-container-highest': '#e0e3e5',
              'surface-container-lowest': '#ffffff',
              'on-surface-variant': '#45464d',
              'inverse-on-surface': '#eff1f3',
              'surface-container': '#eceef0',
              'inverse-surface': '#2d3133',
              'on-primary-fixed-variant': '#3f465c',
              'secondary-fixed': '#d5e3fd',
              'secondary': '#515f74',
              'surface-variant': '#e0e3e5',
              'on-secondary-fixed-variant': '#3a485c',
              'surface-dim': '#d8dadc',
              'on-tertiary-container': '#3980f4',
              'secondary-fixed-dim': '#b9c7e0',
              'on-tertiary': '#ffffff',
              'outline': '#76777d',
              'background': '#f7f9fb',
              'inverse-primary': '#bec6e0',
              'outline-variant': '#c6c6cd',
              'on-background': '#191c1e',
              'tertiary-container': '#001a42',
              'primary-fixed': '#dae2fd',
              'on-error-container': '#93000a',
              'success': '#1a8a3b',
              'success-container': '#d3f4dd',
              'on-success-container': '#00210a',
              'warning': '#8a6500',
              'warning-container': '#fff1d1',
              'on-warning-container': '#2c1900',
            },
            borderRadius: {
              DEFAULT: '0.125rem',
              lg: '0.25rem',
              xl: '0.5rem',
              '2xl': '0.75rem',
              full: '9999px',
            },
            spacing: {
              base: '4px',
              gutter: '16px',
              'row-height-standard': '56px',
              'container-padding': '24px',
              'row-height-dense': '40px',
            },
            fontFamily: {
              'headline-md': ['Hanken Grotesk', 'sans-serif'],
              'body-md': ['Inter', 'sans-serif'],
              badge: ['Inter', 'sans-serif'],
              display: ['Hanken Grotesk', 'sans-serif'],
              'label-mono': ['JetBrains Mono', 'monospace'],
              'headline-lg': ['Hanken Grotesk', 'sans-serif'],
              'body-lg': ['Inter', 'sans-serif'],
            },
            fontSize: {
              'headline-md': ['20px', { lineHeight: '28px', fontWeight: '600' }],
              'body-md': ['14px', { lineHeight: '20px', fontWeight: '400' }],
              badge: ['11px', { lineHeight: '12px', letterSpacing: '0.02em', fontWeight: '700' }],
              display: ['36px', { lineHeight: '44px', letterSpacing: '-0.02em', fontWeight: '700' }],
              'label-mono': ['12px', { lineHeight: '16px', letterSpacing: '0.05em', fontWeight: '500' }],
              'headline-lg': ['28px', { lineHeight: '36px', fontWeight: '600' }],
              'body-lg': ['16px', { lineHeight: '24px', fontWeight: '400' }],
            },
          },
        },
      }
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
        font-size: 20px;
      }
      body { background-color: #f7f9fb; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #c6c6cd; border-radius: 10px; }
      .stagger-move, .stagger-enter-active, .stagger-leave-active { transition: all 0.22s ease; }
      .stagger-enter-from, .stagger-leave-to { opacity: 0; transform: translateY(6px); }
      .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
      .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
  </head>
  <body class="font-body-md text-on-surface antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
